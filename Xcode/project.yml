name: MetalJIT
options:
  bundleIdPrefix: com.metaljit
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    ARCHS: arm64
    BUILD_LIBRARY_FOR_DISTRIBUTION: YES
    MACOSX_DEPLOYMENT_TARGET: "13.0"

targets:
  # =======================================================================
  # MetalJITCore.framework — Nucleo C/C++/ObjC con Motor Metal JIT
  # =======================================================================
  MetalJITCore:
    type: framework
    platform: macOS
    sources:
      - path: ../Sources/MetalJITCore/Modules
        type: sourceFiles
        excludes:
          - "MetalJITInternal.h"
      - path: ../Sources/MetalJITCore/Headers
        buildPhase: headers
        headerVisibility: public
      - path: ../Sources/MetalJITCore/Modules/MetalJITInternal.h
        buildPhase: headers
        headerVisibility: project
    settings:
      base:
        INFOPLIST_FILE: MetalJITCore.framework/Info.plist
        MODULEMAP_FILE: MetalJITCore.framework/module.modulemap
        GENERATE_INFOPLIST_FILE: NO
        PRODUCT_BUNDLE_IDENTIFIER: com.metaljit.MetalJITCore
        PRODUCT_NAME: MetalJITCore
        SKIP_INSTALL: NO
        ENABLE_USER_SCRIPT_SANDBOXING: YES
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_INJECT_BASE_ENTITLEMENTS: NO
        CLANG_CXX_LANGUAGE_STANDARD: c++17
        CLANG_ENABLE_OBJC_ARC: YES
        GCC_WARN_ABOUT_MISSING_PROTOTYPES: NO
        HEADER_SEARCH_PATHS:
          - "$(SRCROOT)/../Sources/MetalJITCore/Headers"
          - "$(SRCROOT)/../Sources/MetalJITCore/Modules"
    dependencies:
      - sdk: Metal.framework
      - sdk: Foundation.framework
    preBuildScripts:
      - name: "Copy PrivacyInfo"
        script: |
          mkdir -p "$TARGET_BUILD_DIR/$UNLOCALIZED_RESOURCES_FOLDER_PATH"
          cp "$SRCROOT/../Sources/MetalJITCore/Resources/PrivacyInfo.xcprivacy" \
             "$TARGET_BUILD_DIR/$UNLOCALIZED_RESOURCES_FOLDER_PATH/"
        inputFiles: []
        outputFiles:
          - "$(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/PrivacyInfo.xcprivacy"

  # =======================================================================
  # MetalJIT.framework — API publica Swift
  # =======================================================================
  MetalJIT:
    type: framework
    platform: macOS
    sources:
      - path: ../Sources/MetalJIT
        type: sourceFiles
    settings:
      base:
        INFOPLIST_FILE: MetalJIT.framework/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        PRODUCT_BUNDLE_IDENTIFIER: com.metaljit.MetalJIT
        PRODUCT_NAME: MetalJIT
        SKIP_INSTALL: NO
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_INJECT_BASE_ENTITLEMENTS: NO
        SWIFT_VERSION: "5.0"
    dependencies:
      - target: MetalJITCore

schemes:
  MetalJITCore:
    build:
      targets:
        MetalJITCore: all
  MetalJIT:
    build:
      targets:
        MetalJIT: all
