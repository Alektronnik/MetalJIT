name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build and Test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Build (SPM)
        run: swift build

      - name: Run Swift runner
        run: swift run MetalJITRunner

      - name: C integration tests
        run: |
          cd Tests
          clang++ -std=c++17 -O0 -fobjc-arc -x objective-c++ MetalJITBindingTest.mm \
            -I ../Sources/MetalJITCore/Headers \
            ../Sources/MetalJITCore/Modules/*.mm \
            -framework Metal -framework Foundation \
            -o /tmp/MetalJITBindingTest
          /tmp/MetalJITBindingTest

      - name: Python integration tests
        run: |
          METALJIT_LIB=.build/debug/libMetalJITCore.dylib python3 Tests/MetalJITBindingTest.py

      - name: XCFramework build (test)
        run: |
          HOMEBREW_NO_AUTO_UPDATE=1 brew install xcodegen
          cd Xcode && xcodegen generate --spec project.yml && cd ..
          ./build_framework.sh release
